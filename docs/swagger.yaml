basePath: /api
definitions:
  dto.ActivationRequest:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
  dto.AdminMovieDetailResponse:
    properties:
      cast_ids:
        items:
          type: integer
        type: array
      dates:
        items:
          type: string
        type: array
      director_ids:
        items:
          type: integer
        type: array
      duration:
        type: string
      genre_ids:
        items:
          type: integer
        type: array
      id:
        type: integer
      location_ids:
        items:
          type: integer
        type: array
      poster:
        type: string
      release_date:
        type: string
      synopsis:
        type: string
      times:
        items:
          type: string
        type: array
      title:
        type: string
    type: object
  dto.AdminMovieListDTO:
    properties:
      duration:
        type: string
      genres:
        type: string
      id:
        type: integer
      poster:
        type: string
      release_date:
        type: string
      title:
        type: string
    type: object
  dto.AdminMovieListResponse:
    properties:
      limit:
        type: integer
      movies:
        items:
          $ref: '#/definitions/dto.AdminMovieListDTO'
        type: array
      page:
        type: integer
      total_data:
        type: integer
      total_page:
        type: integer
    type: object
  dto.AdminResponseError:
    properties:
      message:
        example: Error message detail
        type: string
      status:
        example: error
        type: string
    type: object
  dto.AdminResponseSuccess:
    properties:
      data: {}
      message:
        example: Operation successful
        type: string
      status:
        example: success
        type: string
    type: object
  dto.CastDTO:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dto.ConfirmPaymentRequest:
    properties:
      booking_id:
        example: 1024
        type: integer
      transaction_id:
        example: 5001
        type: integer
    required:
    - booking_id
    - transaction_id
    type: object
  dto.CreateBookingRequest:
    type: object
  dto.CreateBookingResponse:
    properties:
      booking_id:
        example: 1024
        type: integer
    type: object
  dto.DetailInformationRes:
    properties:
      booking_id:
        type: integer
      category:
        type: string
      due_date:
        type: string
      movie_title:
        type: string
      payment_status:
        type: string
      qr_code:
        type: string
      quantity:
        type: integer
      seats:
        items:
          type: string
        type: array
      showtime_date:
        type: string
      showtime_time:
        type: string
      ticket_status:
        type: string
      total_price:
        type: integer
      virtua_account:
        type: integer
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.GenreDTO:
    properties:
      genre:
        type: string
      id:
        type: integer
    type: object
  dto.LocationDTO:
    properties:
      city:
        example: Jakarta
        type: string
      id:
        example: 1
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      message:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserDetails'
    type: object
  dto.MovieDetailResponse:
    properties:
      casts:
        items:
          $ref: '#/definitions/dto.CastDTO'
        type: array
      category:
        example: 13+
        type: string
      directors:
        example: Christopher Nolan
        type: string
      duration:
        example: "2:49:00"
        type: string
      genres:
        items:
          $ref: '#/definitions/dto.GenreDTO'
        type: array
      id:
        example: 1
        type: integer
      poster:
        example: ' https://storage.tickitz.id/posters/interstellar_reborn.jpg'
        type: string
      release_date:
        example: "2025-03-15"
        type: string
      synopsis:
        example: Seorang astronot nekat melintasi lubang cacing demi menyelamatkan
          umat manusia dari kehancuran bumi yang semakin tak layak huni. Perjalanan
          melintasi ruang dan waktu membawa konsekuensi yang tak pernah ia bayangkan
          sebelumnya.
        type: string
      title:
        example: Interstellar Reborn
        type: string
    type: object
  dto.MoviePaginationResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MovieResponse'
        type: array
      message:
        type: string
      meta:
        $ref: '#/definitions/dto.PaginationMeta'
      status:
        type: string
    type: object
  dto.MovieResponse:
    properties:
      genres:
        items:
          $ref: '#/definitions/dto.GenreDTO'
        type: array
      id:
        type: integer
      poster:
        type: string
      release_date:
        type: string
      title:
        type: string
    type: object
  dto.OrderHistoryRes:
    properties:
      booking_id:
        type: integer
      cinema_logo:
        type: string
      cinema_name:
        type: string
      movie_title:
        type: string
      showtime:
        type: string
      status_paid:
        type: string
      status_ticket:
        type: string
    type: object
  dto.PaginationMeta:
    properties:
      current_page:
        type: integer
      has_next:
        type: boolean
      has_prev:
        type: boolean
      limit:
        type: integer
      next:
        type: string
      prev:
        type: string
      total_data:
        type: integer
      total_page:
        type: integer
    type: object
  dto.PaymentMethodDTO:
    properties:
      id:
        example: 2
        type: integer
      logo:
        example: /img/pm/DANA.png
        type: string
      name:
        example: DANA
        type: string
    type: object
  dto.PaymentPageResponse:
    properties:
      booking_id:
        example: 1024
        type: integer
      cinema_name:
        example: CGV Grand Indonesia
        type: string
      email:
        example: ali.mustadji@example.com
        type: string
      full_name:
        example: Ali Mustadji
        type: string
      movie_title:
        example: Interstellar Reborn
        type: string
      payment_methods:
        items:
          $ref: '#/definitions/dto.PaymentMethodDTO'
        type: array
      phone:
        example: "081234567890"
        type: string
      quantity:
        example: 2
        type: integer
      seat_labels:
        example: C7, C8
        type: string
      show_date:
        example: "2026-06-15T00:00:00Z"
        type: string
      show_time:
        example: "18:30"
        type: string
      total_price:
        example: 100000
        type: integer
    type: object
  dto.RegisterRequest:
    properties:
      agree_terms:
        type: boolean
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - agree_terms
    - email
    - password
    type: object
  dto.RegisterResponse:
    properties:
      email:
        type: string
      is_active:
        type: boolean
      message:
        type: string
    type: object
  dto.ResendOTPRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.ResetPasswordReq:
    properties:
      email:
        type: string
      new_password:
        minLength: 8
        type: string
    required:
    - email
    - new_password
    type: object
  dto.ResponseError:
    properties:
      error:
        example: internal server error/bad request
        type: string
      message:
        example: Failed get data/internal server error
        type: string
      status:
        example: error
        type: string
    type: object
  dto.ResponseSuccess:
    properties:
      message:
        example: Welcome, John doe
        type: string
      status:
        example: success
        type: string
    type: object
  dto.SalesChartResponse:
    properties:
      label:
        type: string
      total_revenue:
        type: number
    type: object
  dto.SeatDTO:
    properties:
      row:
        example: C
        type: string
      seat_id:
        example: 145
        type: integer
      seat_number:
        example: 7
        type: integer
      seat_status:
        enum:
        - available
        - sold
        example: available
        type: string
      seat_type:
        example: Regular
        type: string
    required:
    - seat_status
    type: object
  dto.SeatPageResponse:
    properties:
      seats:
        items:
          $ref: '#/definitions/dto.SeatDTO'
        type: array
      summary:
        $ref: '#/definitions/dto.SummaryMovieDTO'
    type: object
  dto.ShowtimeDetailResponse:
    properties:
      cinema_id:
        type: integer
      cinema_logo:
        type: string
      cinema_name:
        type: string
      city:
        type: string
      date:
        type: string
      movie_poster:
        type: string
      price:
        type: integer
      showtime_id:
        type: integer
      time:
        type: string
    type: object
  dto.ShowtimeFilterRequest:
    properties:
      city:
        example: Jakarta
        type: string
      date:
        example: "2025-06-10T15:04:05Z"
        type: string
      show_time:
        example: hh:mm:ss
        type: string
    type: object
  dto.ShowtimeFilterResponse:
    properties:
      locations:
        items:
          $ref: '#/definitions/dto.LocationDTO'
        type: array
      showtime:
        items:
          $ref: '#/definitions/dto.ShowtimeItemDTO'
        type: array
    type: object
  dto.ShowtimeItemDTO:
    properties:
      cinema_id:
        example: 1
        type: integer
      cinema_logo:
        example: ' https://storage.tickitz.id/cinema/ebvid.png'
        type: string
      cinema_name:
        example: ebv.id Grand Indonesia
        type: string
      show_date:
        example: "2025-06-10"
        type: string
      show_time:
        example: "13:30:00"
        type: string
      showtime_id:
        example: 2
        type: integer
      ticket_price:
        example: 75000
        type: integer
    type: object
  dto.SubmitPaymentRequest:
    properties:
      booking_id:
        example: 56
        type: integer
      payment_method_id:
        example: 3
        type: integer
    required:
    - booking_id
    - payment_method_id
    type: object
  dto.SummaryMovieDTO:
    properties:
      category:
        example: 13+
        type: string
      cinema_logo:
        example: https://storage.tickitz.id/cinema/cgv.png
        type: string
      cinema_name:
        example: CGV Grand Indonesia
        type: string
      movie_poster:
        example: https://storage.tickitz.id/posters/interstellar_reborn.jpg
        type: string
      movie_title:
        example: Interstellar Reborn
        type: string
      show_date:
        example: "2026-06-15T00:00:00Z"
        type: string
      show_time:
        example: "18:30"
        type: string
      ticket_price:
        example: 50000
        type: integer
    type: object
  dto.TicketResultResponse:
    properties:
      category:
        example: 13+
        type: string
      movie_title:
        example: Interstellar Reborn
        type: string
      payment_status:
        example: PAID
        type: string
      qr_code:
        example: TICKITZ-TX-5001-SECURE-STRING
        type: string
      seat_labels:
        example: C7, C8
        type: string
      show_date:
        example: "2026-06-15T00:00:00Z"
        type: string
      show_time:
        example: "18:30"
        type: string
      ticket_count:
        example: 2
        type: integer
      total_price:
        example: 100000
        type: integer
    type: object
  dto.TicketSalesResponse:
    properties:
      movie_title:
        type: string
      total_sold:
        type: integer
    type: object
  dto.TransactionModalResponse:
    properties:
      payment_deadline:
        example: "2026-06-13T19:47:00Z"
        type: string
      status:
        example: PENDING
        type: string
      total_price:
        example: 100000
        type: integer
      transaction_id:
        example: 5001
        type: integer
      virtual_rek:
        example: 8856001234567890
        type: integer
    type: object
  dto.UserDetails:
    properties:
      email:
        type: string
      role:
        type: string
    type: object
  dto.UserProfileResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      full_name:
