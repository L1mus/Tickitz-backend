        type: string
      location:
        type: string
      phone:
        type: string
      photo:
        type: string
      point:
        type: integer
    type: object
  dto.UserUpdateProfileRes:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
      photo:
        type: string
    type: object
  dto.VerifyResetOTPReq:
    properties:
      email:
        type: string
      otp:
        type: string
    required:
    - email
    - otp
    type: object
host: localhost:8080
info:
  contact:
    email: limustadji@gmail.com
    name: alpha male
    url: https://github.com/L1mus
  description: This is a backend project for a web application called E-wallet.
  license:
    name: MIT
  title: Movie API
  version: "1.0"
paths:
  /admin/movies:
    get:
      consumes:
      - application/json
      description: Mengambil daftar semua film dengan support searching, filtering,
        dan pagination
      parameters:
      - description: 'Halaman aktif (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Jumlah data per halaman (default: 10)'
        in: query
        name: limit
        type: integer
      - description: Filter Bulan
        in: query
        name: month
        type: integer
      - description: Filter Tahun
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Sukses mengambil list film
          schema:
            allOf:
            - $ref: '#/definitions/dto.AdminResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminMovieListResponse'
              type: object
        "400":
          description: Query parameter tidak valid
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
      summary: Get Admin List Movies
      tags:
      - Admin
    post:
      consumes:
      - multipart/form-data
      description: Menambahkan data film baru beserta file poster dan otomatisasi
        jadwal tayang
      parameters:
      - description: Judul Film
        in: formData
        name: title
        required: true
        type: string
      - description: File Gambar Poster Film
        in: formData
        name: poster
        required: true
        type: file
      - description: 'Tanggal Rilis (Format: YYYY-MM-DD)'
        in: formData
        name: release_date
        required: true
        type: string
      - description: Durasi Jam
        in: formData
        name: duration_hour
        required: true
        type: integer
      - description: Durasi Menit
        in: formData
        name: duration_minute
        required: true
        type: integer
      - description: Sinopsis
        in: formData
        name: synopsis
        required: true
        type: string
      - collectionFormat: multi
        description: Array ID Genre
        in: formData
        items:
          type: integer
        name: genre_ids
        required: true
        type: array
      - collectionFormat: multi
        description: Array ID Cast
        in: formData
        items:
          type: integer
        name: cast_ids
        required: true
        type: array
      - collectionFormat: multi
        description: Array ID Sutradara
        in: formData
        items:
          type: integer
        name: director_ids
        required: true
        type: array
      - collectionFormat: multi
        description: Array ID Kota/Lokasi Bioskop
        in: formData
        items:
          type: integer
        name: location_ids
        required: true
        type: array
      - collectionFormat: multi
        description: Array Tanggal (YYYY-MM-DD)
        in: formData
        items:
          type: string
        name: dates
        required: true
        type: array
      - collectionFormat: multi
        description: Array Jam Tayang (HH:MM)
        in: formData
        items:
          type: string
        name: times
        required: true
        type: array
      produces:
      - application/json
      responses:
        "201":
          description: Sukses menambahkan film baru
          schema:
            $ref: '#/definitions/dto.AdminResponseSuccess'
        "400":
          description: Payload input atau file tidak valid
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
      summary: Add New Movie
      tags:
      - Admin
  /admin/movies/{id}:
    get:
      consumes:
      - application/json
      description: Mengambil data lengkap satu film berdasarkan ID, termasuk semua
        relasi (genre, cast, director, location, dates, times). Digunakan untuk mengisi
        form edit movie.
      parameters:
      - description: ID Film
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Sukses mengambil detail film
          schema:
            allOf:
            - $ref: '#/definitions/dto.AdminResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminMovieDetailResponse'
              type: object
        "400":
          description: ID tidak valid
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
        "404":
          description: Film tidak ditemukan
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
      summary: Get Movie Detail
      tags:
      - Admin
    patch:
      consumes:
      - multipart/form-data
      description: Mengubah data film. Biarkan input kosong jika tidak ingin mengubah
        data spesifik.
      parameters:
      - description: ID Film yang ingin diedit
        in: path
        name: id
        required: true
        type: integer
      - description: Judul Film Baru
        in: formData
        name: title
        type: string
      - description: File Gambar Poster Baru
        in: formData
        name: poster
        type: file
      - description: Tanggal Rilis Baru (YYYY-MM-DD)
        in: formData
        name: release_date
        type: string
      - description: Durasi Jam Baru
        in: formData
        name: duration_hour
        type: integer
      - description: Durasi Menit Baru
        in: formData
        name: duration_minute
        type: integer
      - description: Sinopsis Baru
        in: formData
        name: synopsis
        type: string
      - collectionFormat: multi
        description: Array ID Genre Baru
        in: formData
        items:
          type: integer
        name: genre_ids
        type: array
      - collectionFormat: multi
        description: Array ID Cast Baru
        in: formData
        items:
          type: integer
        name: cast_ids
        type: array
      - collectionFormat: multi
        description: Array ID Sutradara Baru
        in: formData
        items:
          type: integer
        name: director_ids
        type: array
      - collectionFormat: multi
        description: Array ID Lokasi Baru
        in: formData
        items:
          type: integer
        name: location_ids
        type: array
      - collectionFormat: multi
        description: Array Tanggal Baru (YYYY-MM-DD)
        in: formData
        items:
          type: string
        name: dates
        type: array
      - collectionFormat: multi
        description: Array Waktu Baru (HH:MM)
        in: formData
        items:
          type: string
        name: times
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: Sukses mengubah data film
          schema:
            $ref: '#/definitions/dto.AdminResponseSuccess'
        "400":
          description: Payload input tidak valid
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
        "404":
          description: Film tidak ditemukan
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.AdminResponseError'
      summary: Edit Movie
      tags:
      - Admin
  /admin/sales-chart:
    get:
      parameters:
      - description: Filter Judul Film
        in: query
        name: movie_name
        type: string
      - description: Filter rentang waktu
        enum:
        - weekly
        - monthly
        in: query
        name: filter_by
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.SalesChartResponse'
            type: array
      summary: Get Revenue Sales Chart Data
      tags:
      - Admin
  /admin/ticket-sales:
    get:
      parameters:
      - description: Filter ID Genre
        in: query
        name: genre_id
        type: integer
      - description: Filter ID Lokasi
        in: query
        name: location_id
        type: integer
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.TicketSalesResponse'
            type: array
      summary: Get Ticket Sales Data
      tags:
      - Admin
  /auth:
    post:
      consumes:
      - application/json
      description: Authenticate user using email and password to obtain a JWT token
      parameters:
      - description: Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login Successful
          schema:
            allOf:
            - $ref: '#/definitions/dto.ResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.LoginResponse'
              type: object
        "401":
          description: Incorrect email or password
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "403":
          description: Account not activated (ACCOUNT_NOT_ACTIVATED)
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Login User
      tags:
      - Auth
  /auth/check-email:
    post:
      consumes:
      - application/json
      description: Request an OTP to reset user password
      parameters:
      - description: Email Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset password OTP sent to email
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "400":
          description: Invalid input data
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Forgot Password
      tags:
      - Auth
  /auth/check-email/verify-otp:
    post:
      consumes:
      - application/json
      description: Verify the OTP sent for password reset
      parameters:
      - description: OTP Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyResetOTPReq'
      produces:
      - application/json
      responses:
        "200":
          description: OTP verified successfully
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "400":
          description: Invalid input data or Invalid/Expired OTP
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Verify Reset OTP
      tags:
      - Auth
  /auth/check-email/verify-otp/reset:
    post:
      consumes:
      - application/json
      description: Set a new password after successful OTP verification
      parameters:
      - description: New Password Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: Password has been reset successfully
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "400":
          description: Invalid input data, Password Mismatch, or Session Expired
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Reset Password
      tags:
      - Auth
  /auth/logout:
    delete:
      description: Invalidate current JWT token by adding it to Redis blacklist
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "401":
          description: Unauthorized or token not found
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Logout User
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user and send an OTP to their email
      parameters:
      - description: Register Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registration Successful
          schema:
            allOf:
            - $ref: '#/definitions/dto.ResponseSuccess'
            - properties:
                data:
                  $ref: '#/definitions/dto.RegisterResponse'
              type: object
        "400":
          description: Invalid input data
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "409":
          description: Email is already registered
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Register User
      tags:
      - Auth
  /auth/register/activate:
    post:
      consumes:
      - application/json
      description: Verify OTP to activate the user account
      parameters:
      - description: Activation Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ActivationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated successfully
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "400":
          description: Invalid input or Invalid/expired OTP
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Activate Account
      tags:
      - Auth
  /auth/register/resend-otp:
    post:
      consumes:
      - application/json
      description: Resend activation OTP to the user's email
      parameters:
      - description: Email Payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP has been resent successfully
          schema:
            $ref: '#/definitions/dto.ResponseSuccess'
        "400":
          description: Invalid input data
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "422":
          description: Account is already activated
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Failed to resend OTP
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Resend OTP
      tags:
      - Auth
  /movies:
    get:
      consumes:
      - application/json
      description: fetch all movie data to be displayed on the main page
      produces:
      - application/json
      responses:
        "200":
          description: Success to get data
          schema:
            $ref: '#/definitions/dto.MoviePaginationResponse'
        "500":
          description: Failed to get data
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Get All movies
      tags:
      - Movies
  /movies/:id:
    get:
      description: Get the Movie detail data
      parameters:
      - description: Movie ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MovieDetailResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get Movie Detail
      tags:
      - Movies
  /movies/:id/showtime:
    get:
      consumes:
      - application/json
      description: Get the Showtime data filtered result
      parameters:
      - description: Movie ID
        in: path
        name: id
        required: true
        type: integer
      - description: Payload filter showtime
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ShowtimeFilterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ShowtimeFilterResponse'
        "400":
          description: bad request" "must be filled
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      summary: Get Showtime Filter
      tags:
      - Movies
  /movies/{id}/showtimes:
    get:
      description: Fetch schedule and cinema details by movie ID
      parameters:
      - description: Movie ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success
          schema:
            items:
              $ref: '#/definitions/dto.ShowtimeDetailResponse'
            type: array
      summary: Get Movie Showtime Details
      tags:
      - movie
  /order/booking:
    post:
      consumes:
      - application/json
      description: Create a new ticket reservation for selected cinema seats.
      parameters:
      - description: Payload containing showtime ID and selected seat IDs
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBookingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Booking successfully created
          schema:
            $ref: '#/definitions/dto.CreateBookingResponse'
        "400":
          description: Bad Request - Invalid JSON request payload
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "401":
          description: Unauthorized - Authentication required
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "406":
          description: Not Acceptable - Selected seats are already sold or unavailable
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Reserve Seats and Create Booking
      tags:
      - Orders
  /order/seats:
    get:
      consumes:
      - application/json
      description: Retrieve the seating plan and availability status (Available/Sold)
        for a specific showtime.
      parameters:
      - description: Showtime Identifier ID
        in: query
        name: showtime_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved seating layout data
          schema:
            $ref: '#/definitions/dto.SeatPageResponse'
        "400":
          description: Bad Request - Invalid query parameter
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "401":
          description: Unauthorized - Valid authentication token required
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get Cinema Seats Layout
      tags:
      - Orders
  /transactions/checkout:
    post:
      consumes:
      - application/json
      description: Triggers a direct backend-to-backend API request to DOKU Core Sandbox
        System to simulate a payment invoice creation.
      produces:
      - application/json
      responses:
        "200":
          description: Successfully received simulated checkout payload from DOKU
            Core
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error - Failed communicating with external
            payment gateway API
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Simulate DOKU Sandbox Checkout Invoice
      tags:
      - DOKU Integration
  /transactions/confirm:
    post:
      consumes:
      - application/json
      description: Verify and process transaction clearance (simulates payment settlement).
      parameters:
      - description: Payload containing transaction ID and booking ID to be confirmed
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ConfirmPaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Payment settlement verified and confirmed successfully
          schema:
            $ref: '#/definitions/dto.TicketResultResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "406":
          description: Not Acceptable - The transaction has already been paid
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Simulate/Confirm Payment Complete
      tags:
      - Transactions
  /transactions/doku-callback:
    post:
      consumes:
      - application/json
      description: Automated HTTP callback listener endpoint designed to receive status
        notification updates directly pushed by DOKU gateway systems.
      parameters:
      - description: Raw payload notification structure sent from DOKU
        in: body
        name: body
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Returns status verification token acknowledgement back to DOKU
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request - Invalid payload structure
          schema:
            additionalProperties: true
            type: object
      summary: DOKU Webhook Notification Handler Listener
      tags:
      - DOKU Integration
  /transactions/payment/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve checkout summary details (ticket quantity, seats, total
        price, user profile) and available payment options.
      parameters:
      - description: Booking ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved payment information summary
          schema:
            $ref: '#/definitions/dto.PaymentPageResponse'
        "401":
          description: Unauthorized - Login session expired or token invalid
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "404":
          description: Not Found - Booking record not found or does not belong to
            user
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get Payment Page Information
      tags:
      - Transactions
  /transactions/qr/{id}:
    get:
      description: Generates and serves a raw binary PNG QR code image linked to the
        transaction for entry scanning verification.
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - image/png
      responses:
        "200":
          description: Returns raw binary PNG image of the QR Code
          schema:
            type: file
        "500":
          description: Internal Server Error - Failed to generate QR code image output
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Generate Ticket QR Code Image
      tags:
      - Transactions
  /transactions/result/{id}:
    get:
      consumes:
      - application/json
      description: Fetch the finalized digital ticket receipt details after a successful
        transaction payment.
      parameters:
      - description: Transaction ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved final digital ticket information
          schema:
            $ref: '#/definitions/dto.TicketResultResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get Digital Ticket Invoice
      tags:
      - Transactions
  /transactions/submit:
    post:
      consumes:
      - application/json
      description: Process the chosen payment method to initiate a transaction and
        generate payment details (e.g., Virtual Account).
      parameters:
      - description: Payload containing booking ID and selected payment method ID
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SubmitPaymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Payment method submitted successfully
          schema:
            $ref: '#/definitions/dto.TransactionModalResponse'
        "400":
          description: Bad Request - Missing or invalid JSON body parameters
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "403":
          description: Forbidden - Access denied, this booking does not belong to
            the authenticated user
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Submit Selected Payment Method
      tags:
      - Transactions
  /users/history:
    get:
      consumes:
      - application/json
      description: Get list of Order History for logged-in User
      produces:
      - application/json
      responses:
        "200":
          description: Get Order History Succesfully
          schema:
            items:
              $ref: '#/definitions/dto.OrderHistoryRes'
            type: array
        "401":
          description: 'Unauthorized: Token not exist / Format token invalid'
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get User Order History
      tags:
      - Users
  /users/history/{id}/detail:
    get:
      consumes:
      - application/json
      description: Get detailed information for specific order history by user logged-in
      parameters:
      - description: Booking Id
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Get Detail Information User Succesfully
          schema:
            $ref: '#/definitions/dto.DetailInformationRes'
        "400":
          description: Invalid Booking Id Format
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "401":
          description: 'Unauthorized: Token not exist / Format token invalid'
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get Detail Information
      tags:
      - Users
  /users/profile:
    get:
      consumes:
      - application/json
      description: Get the profile data of the logged in user based on the jwt token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserProfileResponse'
        "401":
          description: 'Unauthorized: Token not exist'
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Get User Profile
      tags:
      - Users
    patch:
      consumes:
      - multipart/form-data
      description: Update user data profile
      parameters:
      - description: Update First Name
        in: formData
        name: first_name
        type: string
      - description: Update Last Name
        in: formData
        name: last_name
        type: string
      - description: Update Phone Number
        in: formData
        name: phone
        type: string
      - description: Update New Password
        in: formData
        name: new_password
        type: string
      - description: Confirm New Password
        in: formData
        name: confirm_password
        type: string
      - description: Update Photo Profile
        in: formData
        name: photo
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Update Profile Succesfully
          schema:
            $ref: '#/definitions/dto.UserUpdateProfileRes'
        "400":
          description: Invalid Input Data
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "401":
          description: 'Unauthorized: Token not exist / Format token invalid'
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "422":
          description: File Too Large / Invalid File Format
          schema:
            $ref: '#/definitions/dto.ResponseError'
        "500":
          description: Failed to Update Profile / Failed to Save Image
          schema:
            $ref: '#/definitions/dto.ResponseError'
      security:
      - ApiKeyAuth: []
      summary: Update User Profile
      tags:
      - Users
securityDefinitions:
  ApiKeyAuth:
    description: Bearer token used for authorization
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
